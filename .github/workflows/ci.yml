name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-surface:
    name: public surface guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: internal artifact guard
        run: ./scripts/assert-no-internal-public-artifacts.sh

  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25.0', '1.26.4']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1 -race -cover

  grpc-adapter:
    name: test grpc adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - name: test grpc adapter
        working-directory: adapters/grpc
        run: go test ./... -count=1 -race -cover

  examples:
    name: build examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - name: build all example modules
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Building $dir"
              (cd "$dir" && go build ./...)
            fi
          done

  cross-verifier:
    name: cross-language record verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: install stock RFC 8785 implementation
        run: pip install rfc8785
      - name: Go and stock RFC 8785 (Python) must agree on record hashes
        run: |
          go test ./tests/conformance/... -count=1
          python3 verifiers/python/test_boundary_verify.py
          python3 verifiers/python/boundary_verify.py docs/examples/decision-record.example.json

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 ./...
      - name: govulncheck
        env:
          GOTOOLCHAIN: go1.26.4
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
