name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-surface:
    name: public surface guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: internal artifact guard
        run: ./scripts/assert-no-internal-public-artifacts.sh

  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25.0', '1.26.4']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1 -race -cover

  grpc-adapter:
    name: test grpc adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - name: test grpc adapter
        working-directory: adapters/grpc
        run: go test ./... -count=1 -race -cover

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 ./...
      - name: govulncheck
        env:
          GOTOOLCHAIN: go1.26.4
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
