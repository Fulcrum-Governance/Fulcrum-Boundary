site_name: Fulcrum Boundary
site_description: The action boundary for routed agent tools.
repo_url: https://github.com/Fulcrum-Governance/Fulcrum-Boundary
repo_name: Fulcrum-Governance/Fulcrum-Boundary
docs_dir: docs-site
site_dir: site
theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - toc.follow
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Demos: demo.md
  - FAQ: faq.md
  - Concepts:
      - Action Boundary: concepts/action-boundary.md
  - MCP Firewall:
      - Overview: firewall/index.md
      - Inventory: firewall/inventory.md
      - Risk Graph: firewall/risk-graph.md
      - External Ingest: firewall/external-ingest.md
  - Secure MCP:
      - Overview: secure-mcp/index.md
      - Secure GitHub: secure-mcp/github.md
      - Secure GitHub Live: secure-mcp/github-live-conformance.md
  - Command Boundary:
      - Overview: command-boundary/index.md
      - Demo: command-boundary/demo.md
  - Edit Boundary:
      - Overview: edit-boundary/index.md
      - Inspect: edit-boundary/inspect.md
      - Apply: edit-boundary/apply.md
      - Redteam: edit-boundary/redteam.md
      - Demo: edit-boundary/demo.md
  - Reference:
      - CLI: reference/cli.md
      - Policy Testing: reference/policy-testing.md
      - Route Conformance: reference/route-conformance.md
      - How We Keep Ourselves Honest: reference/how-we-keep-ourselves-honest.md
      - Troubleshooting: reference/troubleshooting.md
      - Release Utilities: reference/release-utilities.md
      - Claims: reference/claims.md
      - Roadmap: reference/roadmap.md
