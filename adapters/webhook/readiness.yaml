adapter: webhook
status: preview
target_status: preview
lifecycle:
  parse: implemented
  identify: implemented
  evaluate: implemented
  deny: implemented
  forward: delegated
  inspect: implemented
  metadata: delegated
  record: delegated
  bypass_proof: stub
  fail_closed: delegated
delegated_steps:
  - step: forward
    owner: webhook.Handler forwardURL mode
    contract: docs/ADAPTER_CONTRACT.md
