adapter: webhook
status: preview
target_status: preview
lifecycle:
  parse: implemented
  identify: implemented
  evaluate: implemented
  deny: implemented
  forward: delegated
  inspect: implemented
  metadata: delegated
  record: delegated
  bypass_proof: delegated
  fail_closed: implemented
delegated_steps:
  - step: forward
    owner: webhook.Handler forwardURL mode
    contract: docs/ADAPTER_CONTRACT.md
  - step: metadata
    owner: webhook.Handler response headers
    contract: docs/ADAPTER_CONTRACT.md
  - step: record
    owner: governance.AuditPublisher
    contract: docs/DECISION_RECORDS.md
  - step: fail_closed
    owner: webhook.Handler execution mode
    contract: docs/security/FAIL_MODE_MATRIX.md
  - step: bypass_proof
    owner: deployment topology
    contract: docs/adapters/WEBHOOK.md
bypass_model: api-gateway
fail_closed_transports:
  - webhook
evidence:
  tests:
    - adapters/webhook/adapter_test.go
    - tests/adapter_conformance/webhook_conformance_test.go
  docs:
    - docs/adapters/WEBHOOK.md
    - docs/ADAPTER_CONTRACT.md
    - docs/ADAPTER_READINESS_MATRIX.md
gaps:
  - id: BND-WEB-001
    description: "Production status requires deployment evidence that execution webhooks are the sole downstream action path; informational webhooks remain post-execution audit only."
    spec: "SPEC 2"
