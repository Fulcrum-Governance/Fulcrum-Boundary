adapter: codeexec
status: preview
target_status: production
lifecycle:
  parse: implemented
  identify: implemented
  evaluate: delegated
  deny: delegated
  forward: delegated
  inspect: implemented
  metadata: implemented
  record: delegated
  bypass_proof: stub
  fail_closed: delegated
delegated_steps:
  - step: evaluate
    owner: governance.Pipeline
    contract: docs/ADAPTER_CONTRACT.md
  - step: deny
    owner: sandbox runtime
    contract: docs/ADAPTER_CONTRACT.md
  - step: forward
    owner: sandbox runtime
    contract: docs/ADAPTER_CONTRACT.md
