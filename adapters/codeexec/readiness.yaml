evidence:
  tests:
    - adapters/codeexec/adapter_test.go
    - adapters/codeexec/adversarial_test.go
    - adapters/codeexec/sandbox_test.go
  docs:
    - docs/ADAPTER_CONTRACT.md
    - docs/ADAPTER_READINESS_MATRIX.md
gaps:
