adapter: securegithub
status: preview
target_status: preview
lifecycle:
  parse: implemented
  identify: implemented
  evaluate: delegated
  deny: implemented
  forward: implemented
  inspect: implemented
  metadata: implemented
  record: delegated
  bypass_proof: delegated
  fail_closed: implemented
delegated_steps:
  - step: evaluate
    owner: governance.Pipeline
    contract: docs/SECURE_MCP_CONTRACT.md
  - step: record
    owner: governance.AuditPublisher
    contract: docs/DECISION_RECORDS.md
  - step: bypass_proof
    owner: deployment topology
    contract: docs/deployment/secure-github-bypass-proofing.md
bypass_model: github-app-or-network-topology
fail_closed_transports:
  - mcp
evidence:
  tests:
    - adapters/securegithub/adapter_test.go
    - adapters/securegithub/github_app_auth_test.go
    - adapters/securegithub/live_conformance_test.go
    - tests/securegithub/secure_github_cli_test.go
    - tests/redteam/secure_github_integration_test.go
    - tests/conformance/secure_github/conformance_test.go
  docs:
    - docs/secure-mcp/GITHUB.md
    - docs/secure-mcp/GITHUB_REDTEAM.md
    - docs/secure-mcp/GITHUB_LIVE_CONFORMANCE.md
    - docs/secure-mcp/GITHUB_LIVE_EVIDENCE.md
    - docs/secure-mcp/GITHUB_LIVE_BYPASS_MODEL.md
    - docs/deployment/secure-github-bypass-proofing.md
    - docs/ADAPTER_READINESS_MATRIX.md
gaps:
  - id: BND-GH-002
    description: "Secure GitHub remains preview until deployment bypass proof shows agents cannot reach direct GitHub API, direct upstream GitHub MCP, SSH, or other credentialed write paths outside Boundary. The live conformance harness proves the configured read and denied-write no-mutation path, not bypass resistance."
    spec: "v0.5 Secure GitHub live conformance"
