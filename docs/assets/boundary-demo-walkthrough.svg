<svg xmlns="http://www.w3.org/2000/svg" width="880" height="940" viewBox="0 0 880 940" role="img" aria-labelledby="t d">
  <title id="t">Fulcrum Boundary - deny-before-upstream walkthrough (fixture-safe)</title>
  <desc id="d">A fixture-safe walkthrough, not a literal capture. Untrusted GitHub issue context flows into a private-repo mutation attempt; Boundary evaluates the routed action, denies before upstream execution with upstream_called=false, and emits a hash-verifiable decision record. No credentials, no network, no live GitHub mutation.</desc>
  <defs>
    <style>
      .bg{fill:#0b0f14}
      .card{fill:#11161d;stroke:#222c38;stroke-width:1.5}
      .eval{fill:#101a20;stroke:#2a4a52;stroke-width:1.5}
      .deny{fill:#1a1012;stroke:#5a2730;stroke-width:1.5}
      .rec{fill:#0e1714;stroke:#274a39;stroke-width:1.5}
      .h1{font:700 30px 'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace;fill:#eef3f8}
      .sub{font:400 16px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#8b9bb0}
      .step{font:700 12px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#5fd0c5;letter-spacing:.22em}
      .head{font:700 20px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#dfe7f0}
      .body{font:400 16px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#aebacb}
      .mono{font:400 15px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#9fb4c7}
      .key{fill:#7cc0ff}
      .ok{fill:#a6e3ab}
      .denyText{font:800 40px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#ff7b86;letter-spacing:.04em}
      .chipbg{fill:#0b0f14;stroke:#2a3542;stroke-width:1}
      .chip{font:600 13px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#8b9bb0}
      .arrow{stroke:#3a4554;stroke-width:2.5;fill:none;marker-end:url(#a)}
      .scope{font:400 13px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#6b7c90}
      .tag{font:600 12px 'JetBrains Mono',Menlo,Consolas,monospace;fill:#5b6b7e}
    </style>
    <marker id="a" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#3a4554"/>
    </marker>
  </defs>

  <rect class="bg" width="880" height="940"/>

  <text class="h1" x="44" y="62">Boundary denies before GitHub is called</text>
  <text class="sub" x="44" y="92">Fixture-safe walkthrough of the GitHub write-after-taint path. Not a literal capture.</text>
  <text class="tag" x="44" y="116">$ boundary demo github-lethal-trifecta</text>

  <g transform="translate(44 140)">
    <rect class="card" width="792" height="118" rx="12"/>
    <text class="step" x="24" y="34">01 - SOURCE</text>
    <text class="head" x="24" y="62">Agent reads untrusted GitHub issue</text>
    <text class="body" x="24" y="90">Tainted issue text enters agent context before any tool call.</text>
    <g transform="translate(556 26)">
      <rect class="chipbg" width="116" height="26" rx="13"/><text class="chip" x="16" y="18">tainted source</text>
    </g>
  </g>
  <path class="arrow" d="M440 258 V286"/>

  <g transform="translate(44 290)">
    <rect class="card" width="792" height="118" rx="12"/>
    <text class="step" x="24" y="34">02 - SINK</text>
    <text class="head" x="24" y="62">Agent proposes a private-repo mutation</text>
    <text class="body" x="24" y="90">A repository write is requested while tainted context is present.</text>
    <g transform="translate(552 26)">
      <rect class="chipbg" width="120" height="26" rx="13"/><text class="chip" x="16" y="18">routed paths only</text>
    </g>
  </g>
  <path class="arrow" d="M440 408 V436"/>

  <g transform="translate(44 440)">
    <rect class="eval" width="792" height="126" rx="12"/>
    <text class="step" x="24" y="34">03 - BOUNDARY EVALUATES</text>
    <text class="head" x="24" y="62">Routed action checked before upstream</text>
    <text class="mono" x="24" y="92"><tspan class="key">matched rule:</tspan> deny-github-write-after-taint-fixture</text>
    <text class="mono" x="24" y="116"><tspan class="key">upstream_called=</tspan><tspan class="ok">false</tspan>   <tspan class="key">read_upstream_called=</tspan>true</text>
  </g>
  <path class="arrow" d="M440 566 V594"/>

  <g transform="translate(44 598)">
    <rect class="deny" width="792" height="206" rx="12"/>
    <text class="step" x="24" y="34">04 - VERDICT</text>
    <text class="denyText" x="24" y="82">DENY</text>
    <text class="body" x="24" y="112">Boundary denies the routed attempt. GitHub is not called.</text>
    <text class="mono" x="24" y="142"><tspan class="key">reason:</tspan> lethal_trifecta_detected</text>
    <g transform="translate(24 158)">
      <rect class="rec" width="744" height="34" rx="8"/>
      <text class="mono" x="16" y="23"><tspan class="ok">decision record emitted</tspan>  -  <tspan class="key">decision hash:</tspan> sha256:25ffc91f491f62c0...</text>
    </g>
  </g>

  <line x1="44" y1="846" x2="836" y2="846" stroke="#1c2530" stroke-width="1"/>
  <text class="scope" x="44" y="876">Scope: fixture-only - no credentials - no network - no live GitHub mutation - routed paths only.</text>
  <text class="scope" x="44" y="898">Hash-verifiable decision record. Not a signed receipt, cryptographic proof, or production Secure GitHub claim.</text>
  <text class="scope" x="44" y="920">No universal prompt-injection, command, or edit control is claimed.</text>
</svg>
