services:
  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      - --listen
      - :8080
      - --policies
      - /demo/policies
      - --upstream
      - postgres://demo:demo@postgres:5432/demo?sslmode=disable
    ports:
      - "${BOUNDARY_DEMO_PORT:-8080}:8080"
    volumes:
      - ./policies:/demo/policies:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - backend

  demo-agent:
    build:
      context: ../..
      dockerfile: Dockerfile
    entrypoint: ["sleep"]
    command: ["infinity"]
    depends_on:
      - gateway
    networks:
      - frontend

networks:
  frontend:
  backend:
    internal: true
