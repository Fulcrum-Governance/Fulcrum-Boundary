  - id: BND-CLAIM-005
    claim: "Boundary produces receipt-grade decision records"
    status: delivered
    evidence:
      tests:
        - path: tests/receipt_verification_test.go
          assertion: "Decision records verify against canonical request and policy hashes and fail after tampering"
        - path: internal/boundarycli/cli_test.go
          assertion: "boundary verify-record succeeds for valid records and fails for tampered records"
      docs:
        - path: docs/RECEIPTS.md
          section: "Verification"
    public_language:
      allowed:
        - "Boundary produces receipt-grade decision records with request, policy bundle, and decision hashes."
      forbidden:
        - "cryptographic proof of verdict"
        - "signed receipt by default"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-CMD-001
    claim: "Boundary provides preview project-local command governance for commands routed through boundary command run, boundary shell, or project-local shims"
    status: delivered
    evidence:
      tests:
        - path: internal/commandboundary/classifier_test.go
          assertion: "command classification covers common command-risk classes without executing commands"
        - path: internal/commandboundary/executor_test.go
          assertion: "wrapper-routed commands are evaluated before execution and denied commands do not execute"
        - path: internal/commandboundary/shim_test.go
          assertion: "project-local command shims route through boundary command run without global shell mutation"
        - path: tests/commandboundary/run_test.go
          assertion: "CLI command run emits decision records and does not execute denied commands"
      docs:
        - path: docs/command-boundary/DESIGN.md
          section: "Purpose"
        - path: docs/command-boundary/PREVIEW_CLAIMS.md
          section: "Preview Claim"
        - path: docs/command-boundary/DEMO.md
          section: "Claim Boundary"
        - path: docs/RELEASE_TRUTH_COMMAND_BOUNDARY.md
          section: "Command Boundary Status"
    public_language:
      allowed:
        - "Boundary can govern project-local command paths when commands route through boundary command run, boundary shell, or project-local shims."
        - "Boundary provides preview project-local command governance for commands routed through boundary command run, boundary shell, or project-local shims."
      forbidden:
        - "Boundary controls your shell"
        - "Boundary protects all CLI activity"
        - "Boundary prevents every overeager agent action"
        - "Boundary protects direct shell access"
        - "Boundary provides production command governance"
        - "Boundary provides shell sandboxing"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-CMD-002
    claim: "Boundary runs fixture Command Boundary redteam packs that deny selected command-risk paths without live mutation"
    status: delivered
    evidence:
