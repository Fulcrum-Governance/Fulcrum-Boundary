claims:
  - id: BND-CLAIM-001
    claim: "Boundary governs MCP Safety Gateway requests before execution when the tool route passes through Boundary"
    status: delivered
    adapter: mcp
    evidence:
      tests:
        - path: internal/boundarycli/cli_test.go
          assertion: "DROP TABLE requests are denied before the downstream handler runs"
      docs:
        - path: docs/BOUNDARY_CONDITIONS.md
          section: "Protected condition"
        - path: docs/LAUNCH_TRUTH_FREEZE.md
          section: "What v0.2.0 Proves"
    public_language:
      allowed:
        - "Boundary evaluates an agent action before it reaches the privileged tool when the deployment routes that action through Boundary."
        - "MCP Safety Gateway"
      forbidden:
        - "Boundary prevents all SQL injection"
        - "Boundary is a SQL firewall"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-002
    claim: "Boundary emits structured decision records for every governed verdict"
    status: delivered
    evidence:
      tests:
        - path: governance/slog_audit_test.go
          assertion: "Pipeline decisions emit structured audit events"
      docs:
        - path: docs/DECISION_RECORDS.md
          section: "Decision Records"
    public_language:
      allowed:
        - "Every governed verdict produces a structured decision record."
      forbidden:
        - "receipt-grade decision record"
        - "hash-verifiable record"
        - "decision hashes"
        - "tamper-detectable record"
        - "signature"
        - "cryptographic proof of verdict"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-003
    claim: "Boundary ships one production MCP adapter and seven preview adapter/profile packages with lifecycle maturity tracked per adapter"
    status: partial
    evidence:
      tests:
        - path: adapters/mcp/adapter_test.go
          assertion: "MCP request parsing is covered"
        - path: adapters/cli/adapter_test.go
          assertion: "CLI adapter parsing, governed forwarding, denial, and metadata are covered"
        - path: tests/adapters/cli_lifecycle_test.go
          assertion: "CLI governed lifecycle denies before execution, executes allowed commands once, records decisions, fails closed on pipeline errors, and documents direct shell bypass"
        - path: adapters/codeexec/adapter_test.go
          assertion: "Code execution adapter parsing, governed forwarding, denial, metadata, and sandbox-policy denials are covered"
        - path: tests/adapters/codeexec_lifecycle_test.go
          assertion: "CodeExec governed lifecycle denies before execution, executes allowed code through a configured boundary, records decisions, fails closed on pipeline errors, and documents direct execution bypass"
        - path: adapters/grpc/adapter_test.go
          assertion: "gRPC unary interceptor behavior, trailer metadata, response inspection, and fail-closed behavior are covered in its module"
        - path: tests/adapter_conformance/grpc_conformance_test.go
          assertion: "gRPC readiness remains preview and documents streaming limitations and bypass requirements"
        - path: tests/integration/managed_agents_lifecycle_test.go
          assertion: "Managed Agents proxy auto-resolves tool confirmations by policy"
        - path: adapters/webhook/adapter_test.go
          assertion: "Webhook informational and execution modes are covered; execution mode denies before forwarding and informational mode records without claiming denial control"
        - path: tests/adapter_conformance/webhook_conformance_test.go
          assertion: "Webhook readiness remains preview and documents the informational/execution split and bypass requirements"
        - path: adapters/a2a/adapter_test.go
          assertion: "A2A request parsing, denial, forwarding, metadata, inspection, and fail-closed behavior are covered"
        - path: tests/adapters/a2a_lifecycle_test.go
          assertion: "A2A governed lifecycle denies before forwarding, forwards allowed tasks, emits records, and fails closed on malformed requests and pipeline errors"
        - path: adapters/securegithub/adapter_test.go
          assertion: "Secure GitHub preview profile denies W1/W2 private-repo mutations after taint before upstream execution and records taint metadata"
        - path: tests/securegithub/secure_github_cli_test.go
          assertion: "boundary secure github setup and serve dry-run expose preview fixture status and reject live mode"
      docs:
        - path: docs/ADAPTER_READINESS_MATRIX.md
          section: "Readiness Matrix"
    public_language:
      allowed:
        - "Boundary includes a production MCP adapter plus CLI, CodeExec, gRPC, Managed Agents, Webhook, A2A, and Secure GitHub preview adapter/profile packages with maturity tracked per adapter."
      forbidden:
        - "six production adapters"
        - "seven production adapters"
        - "supports all major agent transports"
    gaps:
      - id: BND-MAPROD-001
        description: "Managed Agents remains preview until a live upstream conformance run is recorded with operator-owned credentials."
        spec: "SPEC 4"
    depends_on:
      - BND-MAPROD-001

  - id: BND-CLAIM-006
    claim: "Boundary provides a production MCP JSON-RPC proxy adapter"
    status: delivered
    adapter: mcp
    evidence:
      tests:
        - path: tests/integration/mcp_gateway_lifecycle_test.go
          assertion: "MCP gateway governs, forwards, filters, preserves ids, and fails closed"
      docs:
        - path: docs/adapters/MCP.md
          section: "Lifecycle"
        - path: docs/ADAPTER_READINESS_MATRIX.md
          section: "Readiness Matrix"
    public_language:
      allowed:
        - "Boundary provides a production MCP JSON-RPC proxy adapter."
      forbidden:
        - "Boundary production-protects MCP tools without deployment isolation"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-007
    claim: "Boundary provides a preview Managed Agents proxy adapter"
    status: partial
    adapter: managedagents
    evidence:
      tests:
        - path: tests/integration/managed_agents_lifecycle_test.go
          assertion: "Managed Agents tool events are governed and auto-resolved as allow or deny confirmations"
        - path: tests/integration/managed_agents_multiagent_test.go
          assertion: "Managed Agents thread budgets and trust state affect confirmations"
      docs:
        - path: docs/adapters/MANAGED_AGENTS.md
          section: "Lifecycle"
        - path: docs/deployment/managed-agents-bypass-proofing.md
          section: "Required Controls"
    public_language:
      allowed:
        - "Boundary provides a preview Managed Agents proxy adapter for policy-driven tool confirmations."
      forbidden:
        - "Boundary production-protects Managed Agents without a live upstream conformance run"
        - "Boundary controls Managed Agents sessions when customer apps can send confirmations directly"
    gaps:
      - id: BND-MAPROD-001
        description: "Production status requires a live upstream Anthropic Managed Agents conformance run with operator-owned credentials."
        spec: "SPEC 4"
    depends_on:
      - BND-MAPROD-001

  - id: BND-CLAIM-008
    claim: "Boundary includes a Postgres AST guard for classifying SQL statements before PolicyEval"
    status: delivered
    evidence:
      tests:
        - path: tests/interceptors/sql_postgres_test.go
          assertion: "Postgres SQL is classified by parser AST class and destructive or unknown SQL fails closed"
        - path: tests/interceptors/sql_evasion_test.go
          assertion: "The SQL evasion corpus contains at least 30 cases and verifies expected classes"
      docs:
        - path: docs/policies/POSTGRES.md
          section: "Postgres AST Guard"
        - path: docs/POLICY_SCHEMA.md
          section: "Request Context"
    public_language:
      allowed:
        - "Boundary includes a Postgres AST guard that classifies statements before PolicyEval."
      forbidden:
        - "Boundary is a SQL firewall"
        - "Boundary prevents all SQL injection"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-009
    claim: "Boundary provides standalone trust integration and adaptive termination for protected adapters"
    status: delivered
    evidence:
      tests:
        - path: tests/adaptive_termination_test.go
          assertion: "Repeated protected-tool violations isolate an agent before later protected requests execute"
        - path: tests/integration/trust_production_test.go
          assertion: "Trust state updates are emitted in decision records and exposed by boundary trust show"
        - path: tests/integration/trust_fail_closed_test.go
          assertion: "Kernel trust errors fail closed before protected requests reach downstream execution"
      docs:
        - path: docs/TRUST_INTEGRATION.md
          section: "Modes"
        - path: docs/ADAPTIVE_TERMINATION.md
          section: "State Transitions"
    public_language:
      allowed:
        - "Boundary provides standalone trust integration and adaptive termination for protected adapters."
        - "Repeated protected-tool violations can isolate an agent before later protected calls execute."
      forbidden:
        - "Boundary guarantees universal agent safety"
        - "Boundary replaces deployment isolation"
        - "Boundary owns Fulcrum's canonical trust model"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-010
    claim: "Boundary defines standalone and kernel integration contracts for the Fulcrum control plane"
    status: delivered
    evidence:
      tests:
        - path: tests/integration/standalone_test.go
          assertion: "Standalone mode boots with local policies, in-process trust, budget, envelope, and proof correspondence"
        - path: tests/integration/kernel_test.go
          assertion: "Kernel bridge contracts load policy, read trust, call budget, publish escalation, audit, and envelope events"
      docs:
        - path: docs/INTEGRATION.md
          section: "Interface Contracts"
        - path: docs/STANDALONE_VS_KERNEL.md
          section: "Standalone vs Kernel"
        - path: docs/PROOF_BOUNDARY.md
          section: "Proof Boundary"
    public_language:
      allowed:
        - "Boundary defines standalone and kernel integration contracts for the Fulcrum control plane."
        - "Kernel mode names the policy, trust, budget, escalation, audit, and envelope seams explicitly."
      forbidden:
        - "Boundary mechanically extracts runtime code from Lean proofs"
        - "Boundary emits proved decisions"
        - "Boundary production-connects to every Fulcrum service without operator configuration"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-011
    claim: "Boundary inventories local MCP client configs and classifies discovered MCP server capabilities without mutating those configs"
    status: delivered
    evidence:
      tests:
        - path: internal/firewall/inventory_test.go
          assertion: "Inventory discovers repo-local and user MCP configs, classifies GitHub, filesystem, and database servers, and redacts secret-like values"
        - path: tests/firewall/inventory_cli_test.go
          assertion: "boundary inventory reports GitHub W2 risk and boundary init does not mutate MCP config files"
      docs:
        - path: docs/firewall/DISCOVERY_INVENTORY.md
          section: "MCP Firewall Discovery And Inventory"
    public_language:
      allowed:
        - "Boundary inventories local MCP client configs and classifies discovered MCP server capabilities without mutating those configs."
        - "Discovery is read-only for MCP client configs."
      forbidden:
        - "Boundary protects discovered MCP servers before install"
        - "Boundary rewrites MCP client configs during inventory"
        - "Boundary detects every dangerous MCP server"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-012
    claim: "Boundary renders inventory-derived MCP risk graphs and generates verifiable starter firewall policies"
    status: delivered
    evidence:
      tests:
        - path: internal/firewall/graph_policy_test.go
          assertion: "Risk graph detects untrusted input, repo write, external sink, descriptor, database, filesystem, and privileged mutation paths; starter policies load without warnings"
        - path: tests/firewall/inventory_cli_test.go
          assertion: "boundary graph renders JSON and Mermaid risk paths, and boundary policy generate creates policies that pass boundary verify"
      docs:
        - path: docs/firewall/RISK_GRAPH_POLICY_GENERATION.md
          section: "MCP Firewall Risk Graph And Policy Generation"
    public_language:
      allowed:
        - "Boundary renders inventory-derived MCP risk graphs and generates verifiable starter firewall policies."
        - "Generated policies are starter policies that require operator review before deployment."
      forbidden:
        - "Boundary graph protects MCP servers"
        - "Generated policies are production-complete"
        - "Boundary detects every MCP exploit path"
        - "Boundary proves runtime write-after-taint denial from generated policies alone"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-013
    claim: "Boundary installs reversible MCP config routes and verifies descriptor lockfiles for local MCP server descriptors"
    status: delivered
    evidence:
      tests:
        - path: internal/firewall/install_lock_test.go
          assertion: "Install dry-run changes nothing, install writes a backup and receipt, uninstall restores the exact original bytes, and descriptor lock verification detects drift"
        - path: tests/firewall/inventory_cli_test.go
          assertion: "boundary install, uninstall, lock, and verify-lock cover dry-run, byte-for-byte restore, receipt creation, and deny-on-drift CLI behavior"
      docs:
        - path: docs/firewall/INSTALL_LOCK.md
          section: "MCP Firewall Install And Descriptor Lock"
    public_language:
      allowed:
        - "Boundary installs reversible MCP config routes and verifies descriptor lockfiles for local MCP server descriptors."
        - "Install supports dry-run, install receipts, and byte-for-byte backup restore."
      forbidden:
        - "Boundary install protects MCP servers by itself"
        - "Descriptor lock proves an upstream MCP server is safe"
        - "Generic install provides live runtime protection without a governed profile"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-014
    claim: "Boundary runs fixture redteam packs that demonstrate expected deny outcomes without real secrets or live system mutation"
    status: delivered
    evidence:
      tests:
        - path: internal/redteam/redteam_test.go
          assertion: "Default GitHub lethal-trifecta fixture denies write-after-taint, emits a decision record, and uses no real secrets or live mutation"
        - path: tests/redteam/redteam_cli_test.go
          assertion: "boundary redteam reports expected DENY, actual DENY, reason, decision record output, fixture-only safety, and stub pack listing"
      docs:
        - path: docs/firewall/REDTEAM.md
          section: "MCP Firewall Redteam Fixtures"
    public_language:
      allowed:
        - "Boundary runs fixture redteam packs for expected deny outcomes without real secrets or live mutation."
        - "The GitHub lethal-trifecta fixture demonstrates write-after-taint denial before upstream execution in fixture mode."
      forbidden:
        - "Boundary has live GitHub exploit conformance"
        - "Redteam fixtures prove all MCP attacks are blocked"
        - "Fixture redteam mutates real systems"
        - "Boundary prevents every prompt injection attack"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-015
    claim: "Boundary provides a preview Secure GitHub MCP profile for fixture write-after-taint denial before GitHub mutation"
    status: delivered
    adapter: securegithub
    evidence:
      tests:
        - path: adapters/securegithub/adapter_test.go
          assertion: "Secure GitHub denies W1 and W2 private-repo mutations after external GitHub taint before upstream execution"
        - path: tests/securegithub/secure_github_cli_test.go
          assertion: "boundary secure github setup and serve dry-run preserve preview fixture language and fail closed for live mode"
        - path: tests/redteam/secure_github_integration_test.go
          assertion: "Secure GitHub fixture path uses the shared write-after-taint policy and does not call upstream on denied write"
      docs:
        - path: docs/secure-mcp/GITHUB.md
          section: "Secure GitHub MCP"
        - path: docs/secure-mcp/GITHUB_REDTEAM.md
          section: "Secure GitHub Redteam Fixture"
        - path: docs/deployment/secure-github-bypass-proofing.md
          section: "Release Gate"
    public_language:
      allowed:
        - "Boundary provides a preview Secure GitHub MCP profile for fixture write-after-taint denial before GitHub mutation."
        - "Secure GitHub remains preview until live GitHub App conformance evidence and deployment bypass proof exist."
      forbidden:
        - "Secure GitHub is production"
        - "Boundary fully secures GitHub"
        - "Secure GitHub prevents every malicious issue"
        - "Secure GitHub has live GitHub App conformance"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-016
    claim: "Boundary provides a local-only MCP Firewall dashboard over inventory, risk paths, policies, install receipts, descriptor locks, and local decision-record files"
    status: delivered
    evidence:
      tests:
        - path: internal/firewall/dashboard_test.go
          assertion: "Dashboard summarizes local firewall inventory, risk graph, policy, install receipt, descriptor lock, and decision-record artifacts"
        - path: tests/firewall/inventory_cli_test.go
          assertion: "boundary dashboard renders text and HTML output from local artifacts and rejects non-loopback serve addresses"
      docs:
        - path: docs/firewall/DASHBOARD.md
          section: "Boundary Firewall Dashboard"
    public_language:
      allowed:
        - "Boundary provides a local-only MCP Firewall dashboard over inventory, risk paths, policy status, install receipts, descriptor lock status, and local decision-record files."
        - "The dashboard is visibility, not a hosted monitoring service and not runtime protection by itself."
      forbidden:
        - "Boundary provides a hosted firewall dashboard"
        - "Boundary dashboard monitors production deployments"
        - "Boundary dashboard protects MCP servers by itself"
        - "Boundary dashboard streams remote telemetry"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-017
    claim: "Boundary provides a GitHub Action that audits repo-local MCP configs and emits Markdown and SARIF reports"
    status: delivered
    evidence:
      tests:
        - path: tests/actions/mcp_audit_fixture_test.go
          assertion: "MCP audit action metadata exposes expected inputs/outputs and the action script audits repo-local MCP configs, writes Markdown/SARIF reports, and avoids HOME default scans unless enabled"
      docs:
        - path: docs/firewall/GITHUB_ACTION.md
          section: "Boundary MCP Audit GitHub Action"
        - path: actions/mcp-audit/README.md
          section: "Fulcrum Boundary MCP Audit Action"
    public_language:
      allowed:
        - "Boundary provides a GitHub Action that audits repo-local MCP configs and emits Markdown and SARIF reports."
        - "The MCP audit action scans repo-local MCP configs by default and does not scan runner home directories unless include-defaults is enabled."
      forbidden:
        - "Boundary Action protects MCP servers at runtime"
        - "Boundary Action scans host home directories by default"
        - "Boundary Action installs the gateway"
        - "Boundary Action proves all MCP risks are blocked"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-004
    claim: "Boundary is a SQL firewall"
    status: "false"
    evidence:
      tests: []
      docs:
        - path: docs/LAUNCH_TRUTH_FREEZE.md
          section: "What v0.2.0 Does Not Claim"
    public_language:
      allowed:
