# Boundary claims ledger — the machine-readable source of truth for public language.
# Parsed and build-gated by claims/claims_test.go and claims/forbidden_test.go.
#
# public_language.forbidden is ADVISORY: each entry names a capability framing the
# claim must never assert. Forbidden phrases are governed in public copy by the
# hardcoded Gate-2 lint rules (claims/language_lint_test.go) plus human review —
# they are NOT literally substring-scanned against documents, because concept words
# such as "signature" and "decision hashes" appear legitimately in honest, hedged
# copy and literal enforcement would brick truthful text. The lists are still
# machine-checked for integrity (non-empty, unique within a claim, never also in
# that claim's allowed list) and pinned in sync with the lint terms — see
# claims/forbidden_test.go. See docs/CLAIMS_LEDGER.md "Public-language lists".
claims:
  - id: BND-CLAIM-001
    claim: "Boundary governs MCP Safety Gateway requests before execution when the tool route passes through Boundary"
    status: delivered
    adapter: mcp
    evidence:
      tests:
        - path: internal/boundarycli/cli_test.go
          assertion: "DROP TABLE requests are denied before the downstream handler runs"
      docs:
        - path: docs/BOUNDARY_CONDITIONS.md
          section: "Protected condition"
        - path: docs/internal/LAUNCH_TRUTH_FREEZE.md
          section: "What v0.2.0 Proves"
    public_language:
      allowed:
        - "Boundary evaluates an agent action before it reaches the privileged tool when the deployment routes that action through Boundary."
        - "MCP Safety Gateway"
      forbidden:
        - "Boundary prevents all SQL injection"
        - "Boundary is a SQL firewall"
    gaps: []
    depends_on: []

  - id: BND-CLAIM-002
