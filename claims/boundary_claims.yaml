          section: "Decision Records"
    public_language:
      allowed:
        - "Every governed verdict produces a structured decision record."
      forbidden:
        - "receipt-grade decision record"
        - "hash-verifiable record"
        - "decision hashes"
        - "tamper-detectable record"
        - "signature"
        - "cryptographic proof of verdict"
    gaps: []
    depends_on: []

