        description: "Build-provenance attestation (both archive families) and the native-cgo archive SBOM run only on a v* tag — the cgo SBOM in the per-runner cgo-binaries matrix and attestation via the workflow's GitHub OIDC token — so they are unproven until the first tagged release runs the updated pipeline. Verified locally short of a release: the static-archive SBOM via `goreleaser release --snapshot` (6 SPDX files) and the cgo SBOM command via `syft` on a cgo archive (valid SPDX-2.3)."
        spec: "GitHub issue #140 — SBOM and provenance attestation for release artifacts (cgo SBOM closes BND-DIST-002's cgo gap)"
    depends_on:
      - BND-CLAIM-DIST-001

