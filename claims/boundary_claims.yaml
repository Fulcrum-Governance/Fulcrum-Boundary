        - "The static build never allows SQL the cgo build would deny."
        - "The static build's reduction is classification capability, not deny posture."
      forbidden:
        - "Static builds carry the full Postgres AST classifier"
        - "Static builds classify SQL statements by class"
        - "The static and cgo builds behave identically on SQL routes"
    gaps: []
    depends_on:
